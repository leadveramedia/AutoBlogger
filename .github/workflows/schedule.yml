# .github/workflows/schedule.yml
name: Scheduled Blog Automation

on:
  # Schedule to run once a day at 10:00 AM UTC
  schedule:
    - cron: '0 10 * * *'
  # Allows manual runs from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run_automation:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run Automation Script
      run: python run.py
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
        SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
        SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
        ARGIL_API_KEY: ${{ secrets.ARGIL_API_KEY }}
        ARGIL_VOICE_ID: ${{ secrets.ARGIL_VOICE_ID }}
        USEAPI_TOKEN: ${{ secrets.USEAPI_TOKEN }}
        USEAPI_GOOGLE_EMAIL: ${{ secrets.USEAPI_GOOGLE_EMAIL }}

    - name: Upload videos to Google Drive
      if: hashFiles('videos/*.mp4') != ''
      run: |
        curl -s https://rclone.org/install.sh | sudo bash
        mkdir -p ~/.config/rclone
        echo "$RCLONE_CONFIG" > ~/.config/rclone/rclone.conf
        rclone copy videos/ gdrive:${{ secrets.GOOGLE_DRIVE_FOLDER_ID }} --include "*.mp4" -v
        rm -f ~/.config/rclone/rclone.conf
      env:
        RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}

    - name: Commit updated tracking files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add titles.json used_topics.json
        git diff --staged --quiet || git commit -m "Update tracking files after blog generation"
        git push
